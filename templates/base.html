<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block description %}Florida Chicken Coops builds premium, long-lasting chicken coops with free delivery across Broward, Miami-Dade, and Homestead, and statewide delivery throughout Florida.{% endblock %}" />
  <title>{% block title %}Florida Chicken Coops{% endblock %}</title>

  <!-- Brand display serif (Playfair Display) — used for headings/hero. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block head_extra %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

  {% include 'partials/header.html' %}

  <main id="main" tabindex="-1">
    {% block content %}{% endblock %}
  </main>

  {% include 'partials/footer.html' %}

  <!-- Page interactivity (Vanilla JS) -->
  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
